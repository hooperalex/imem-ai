services:
  - type: web
    name: imem-mcp-server
    env: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: ./
    envVars:
      - key: NODE_ENV
        value: production
      - key: MEMPALACE_PALACE_PATH
        value: /app/palace
      - key: PORT
        value: 10000
